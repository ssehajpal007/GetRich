<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampatti Dosh Audit - अमीर बनने का रास्ता</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color:#eee;
}

.container {
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card {
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,215,0,0.15);
    padding:20px;
    border-radius:12px;
}

.progress {
    height:8px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}

.progress-bar {
    height:100%;
    background:linear-gradient(90deg,#00ff99,#ffd700);
}

button {
    background:linear-gradient(90deg,#00ff99,#ffd700);
    border:none;
    padding:10px 20px;
    margin-top:15px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:none;
}

.radio-option {
    display:block;
    margin:10px 0;
    padding:12px;
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,215,0,0.1);
    border-radius:10px;
    transition:0.2s;
}

.radio-option:hover {
    border-color:gold;
    transform:scale(1.02);
}

.small {font-size:12px;color:#aaa;}
.red {color:#ff4d4d;}
.green {color:#00ff99;}

.money {
    position:absolute;
    font-size:16px;
    pointer-events:none;
    opacity:0.9;
    transition:all 0.6s ease-out;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

let current = 0;
let answers = JSON.parse(localStorage.getItem("answers")) || {};
let user = JSON.parse(localStorage.getItem("user")) || {};

const totalQuestions = 50;

function moneyBurst(x,y){
    const symbols = ["₹","$","€","£"];
    for(let i=0;i<7;i++){
        let el = document.createElement("div");
        el.className="money";
        el.innerText = symbols[Math.floor(Math.random()*symbols.length)];
        el.style.left = x+"px";
        el.style.top = y+"px";

        let dx = (Math.random()*100)-50;
        let dy = (Math.random()*-80)-20;

        setTimeout(()=>{
            el.style.transform=`translate(${dx}px,${dy}px)`;
            el.style.opacity=0;
        },10);

        document.body.appendChild(el);
        setTimeout(()=>el.remove(),600);
    }
}

// STEP 1: NAME + AGE
function startScreen(){
    app.innerHTML = `
    <div class="card">
        <h2>Wealth & Destiny Audit</h2>
        <p>यह टेस्ट आपकी आदतों को दिखाएगा — सच जानने के लिए तैयार हो?</p>

        <input id="name" placeholder="Enter your name">
        <input id="age" placeholder="Enter your age" type="number">

        <button onclick="startAudit()">Start Audit</button>
    </div>
    `;
}

function startAudit(){
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;

    if(!name || !age){
        alert("Enter name & age");
        return;
    }

    user = {name, age};
    localStorage.setItem("user", JSON.stringify(user));

    renderQuestion();
}

// QUESTIONS
const questions = [
{
q:"How much do you hustle to earn money?",
h:"आप पैसे कमाने के लिए कितना मेहनत करते हो?",
options:[
["Very little — I mostly think about money, not work",2],
["Sometimes — I work when I feel like it",4],
["Daily — I put in consistent effort",7],
["I grind 10+ hours — focused & serious",10]
]
},
{
q:"Do you think your current daily routine will make you rich in 5 years?",
h:"क्या आपकी दिनचर्या आपको 5 साल में अमीर बनाएगी?",
options:[
["No — it's random and unplanned",2],
["I don't think so — but I haven't fixed it",3],
["I hope so — but not sure",4],
["Yes — it's structured and improving",8]
]
},
{
q:"How many hours do you scroll social media per day?",
h:"आप रोज कितना सोशल मीडिया चलाते हो?",
options:[
["6+ hours — I lose track of time",1],
["4-5 hours — a big chunk of my day",3],
["2-3 hours — controlled but still high",6],
["0-1 hour — minimal distraction",10]
]
},
{
q:"Do you keep your room messy?",
h:"क्या आपका कमरा गंदा रहता है?",
options:[
["Extremely messy — clothes everywhere",1],
["Very messy — rarely cleaned",2],
["Somewhat messy — inconsistent cleaning",5],
["Mostly clean — but not daily",7],
["Clean daily — disciplined environment",10]
]
},
{
q:"Do you pray or maintain any discipline ritual?",
h:"क्या आप कोई नियमित अनुशासन रखते हैं?",
options:[
["No — no routine at all",2],
["Sometimes — inconsistent",5],
["Yes — somewhat regular",8],
["Daily without fail",10]
]
},
{
q:"How often do you clean your northeast corner (Ishaan Kon)?",
h:"आप ईशान कोण कितनी बार साफ करते हो?",
options:[
["Never — I ignore it",1],
["Rarely — once in months",3],
["Monthly — basic cleaning",6],
["Weekly — regular care",8],
["Daily — always clean",10]
]
},
{
q:"Do you have broken items or clutter at home?",
h:"क्या आपके घर में टूटी चीजें या कबाड़ है?",
options:[
["Yes — many broken/junk items",1],
["Some clutter — not fully clean",4],
["Very little — mostly clean",7],
["No — completely clutter-free",10]
]
}
];

// fill rest
while(questions.length < 50){
    questions.push({
        q:"Do you take consistent action toward financial growth?",
        h:"क्या आप लगातार पैसे कमाने के लिए काम करते हैं?",
        options:[
            ["No — mostly thinking, not doing",2],
            ["Sometimes — inconsistent effort",5],
            ["Yes — regular action",8],
            ["Daily disciplined effort",10]
        ]
    });
}

function renderQuestion(){
    let q = questions[current];

    let html = `
    <div class="card">
    <div class="progress">
        <div class="progress-bar" style="width:${(current/50)*100}%"></div>
    </div>

    <p>${current+1}/50</p>

    <h3>${q.q}</h3>
    <div class="small">${q.h}</div>
    `;

    q.options.forEach(opt=>{
        html += `
        <label class="radio-option">
        <input type="radio" name="q" value="${opt[1]}"
        ${answers[current]==opt[1]?"checked":""}
        onclick="selectAnswer(event,${opt[1]})">
        ${opt[0]}
        </label>`;
    });

    html += `
    <button onclick="prev()">Back</button>
    <button onclick="next()">Next</button>
    </div>
    `;

    app.innerHTML = html;
}

function selectAnswer(e,val){
    answers[current]=val;
    localStorage.setItem("answers",JSON.stringify(answers));
    moneyBurst(e.clientX,e.clientY);
}

function next(){
    if(current<49){
        current++;
        renderQuestion();
    } else {
        showResult();
    }
}

function prev(){
    if(current>0){
        current--;
        renderQuestion();
    }
}

function showResult(){
    let total=0;
    Object.values(answers).forEach(v=>total+=v||0);

    let percent = Math.round((total/500)*100);

    app.innerHTML = `
    <div class="card">
    <h2>${user.name}, your Wealth Score: ${percent}%</h2>

    <p class="red">
    You are not busy — you are distracted.<br>
    Your habits are shaping your financial future right now.
    </p>

    <button onclick="showPlan()">I Want to Become Rich</button>
    </div>
    `;
}

function showPlan(){
    app.innerHTML = `
    <div class="card">
    <h2>Action Plan</h2>
    <p class="green">Start fixing your habits today.</p>

    <ul>
    <li>Clean your room</li>
    <li>Reduce scrolling</li>
    <li>Build daily discipline</li>
    </ul>

    <button onclick="finalPromise()">I Will Start Today</button>
    </div>
    `;
}

function finalPromise(){
    alert("Your commitment is noted. Stay consistent.");
}

// INIT
if(!user.name){
    startScreen();
} else {
    renderQuestion();
}

</script>

</body>
</html>
