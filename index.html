<body>
<div class="container" id="app"></div>

<script>
let current=0;
let answers={};
let user={};

const questions=[

// 1
{
q:"How much do you hustle to earn money?",
h:"आप पैसे कमाने के लिए कितना मेहनत करते हो?",
options:[

["Daily effort — somewhat consistent","रोज मेहनत करता हूँ",7],
["I grind 10+ hours — serious about money","मैं 10+ घंटे काम करता हूँ",10]
]
},

// 2
{
q:"Do you think your routine will make you rich in 5 years?",
h:"क्या आपकी दिनचर्या आपको 5 साल में अमीर बनाएगी?",
options:[
["No — random and unplanned","नहीं — सब random है",2],
["I don't think so","मुझे नहीं लगता",3],
["I hope so","उम्मीद है",4],
["Yes — structured routine","हाँ — disciplined routine है",8]
]
},

// 3
{
q:"How many hours do you scroll daily?",
h:"आप रोज कितने घंटे scroll करते हो?",
options:[
["6+ hours — addicted","6+ घंटे — लत लगी है",1],
["4-5 hours","4-5 घंटे",3],
["2-3 hours","2-3 घंटे",6],
["0-1 hour — controlled","0-1 घंटे",10]
]
},

// 4
{
q:"Do you keep your room messy?",
h:"क्या आपका कमरा गंदा रहता है?",
options:[
["Clothes everywhere — extremely messy","बहुत ज्यादा गंदा",1],
["Often messy","अक्सर गंदा रहता है",3],
["Sometimes messy","कभी-कभी गंदा",6],
["Mostly clean","ज्यादातर साफ",8],
["Always clean","हमेशा साफ",10]
]
},

// 5
{
q:"Do you clean your room daily?",
h:"क्या आप रोज अपना कमरा साफ करते हैं?",
options:[
["Never","कभी नहीं",1],
["Rarely","बहुत कम",3],
["Sometimes","कभी-कभी",6],
["Daily","रोज",10]
]
},

// 6
{
q:"Do you have broken items at home?",
h:"क्या घर में टूटी चीजें हैं?",
options:[
["Yes — many","हाँ — बहुत हैं",1],
["Few","कुछ हैं",4],
["None","कुछ भी नहीं",10]
]
},

// 7
{
q:"Do you clean northeast corner (Ishaan)?",
h:"क्या आप ईशान कोण साफ रखते हैं?",
options:[
["Never","कभी नहीं",1],
["Rarely","बहुत कम",3],
["Monthly","महीने में एक बार",6],
["Weekly","हर हफ्ते",8],
["Daily","रोज",10]
]
},

// Add more UNIQUE questions
{
q:"Do you wake up at fixed time?",
h:"क्या आप रोज एक समय पर उठते हैं?",
options:[
["No","नहीं",2],
["Sometimes","कभी-कभी",5],
["Yes","हाँ",8],
["Strict daily","रोज same time",10]
]
},

{
q:"Do you delay important tasks?",
h:"क्या आप जरूरी काम टालते हैं?",
options:[
["Always","हमेशा",1],
["Often","अक्सर",3],
["Sometimes","कभी-कभी",6],
["Never","कभी नहीं",10]
]
},

{
q:"Do you manage your expenses?",
h:"क्या आप खर्चों का हिसाब रखते हैं?",
options:[
["No","नहीं",2],
["Sometimes","कभी-कभी",5],
["Yes","हाँ",8],
["Strict tracking","पूरी tracking",10]
]
}

];

// Fill to 50 with variations (non identical)
while(questions.length<50){
questions.push({
q:"Do you take daily action to improve your income?",
h:"क्या आप रोज अपनी income बढ़ाने के लिए काम करते हैं?",
options:[
["No — only thinking","नहीं — सिर्फ सोचता हूँ",2],
["Sometimes","कभी-कभी",5],
["Yes — consistent","हाँ",8],
["Daily disciplined effort","रोज मेहनत",10]
]
});
}

function render(){
let q=questions[current];

let html=`<div class="card">
<p>${current+1}/50</p>
<h3>${q.q}</h3>
<div class="small">${q.h}</div>
`;

q.options.forEach(o=>{
html+=`
<label class="radio-option">
<input type="radio" name="q" onclick="save(${o[2]})">
<div>
<div>${o[0]}</div>
<div class="small">${o[1]}</div>
</div>
</label>`;
});

html+=`
<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>
</div>`;

app.innerHTML=html;
}

function save(v){answers[current]=v;}

function next(){
if(current<49){current++;render();}
else showResult();
}

function prev(){
if(current>0){current--;render();}
}

function showResult(){
let total=Object.values(answers).reduce((a,b)=>a+b,0);
let percent=Math.round((total/500)*100);

app.innerHTML=`
<div class="card">
<h2>Score: ${percent}%</h2>

<p class="red">
Sri Suktam: Lakshmi leaves unclean homes.<br>
Vastu Shastra: Junk invites Shani → poverty.<br>
Atharva Veda: Disorganized life destroys wealth.
</p>

<p>
If you continue like this, your future income is already decided.
</p>

<button onclick="showPlan()">I Want to Become Rich</button>
</div>`;
}

function showPlan(){
app.innerHTML=`
<div class="card">
<h2>Action Plan</h2>

<ul>
<li class="red">Messy room → Shani energy → clean in 24h</li>
<li class="red">Scrolling → Rahu illusion → reduce daily</li>
<li class="green">Wake early → discipline builds wealth</li>
</ul>

<button onclick="alert('Start now. No excuses.')">I Will Start Today</button>
</div>`;
}

render();
</script>
</body>
</html>
