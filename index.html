const TOTAL = 50;

let user = JSON.parse(localStorage.getItem('user')||'{}');

function burst(x,y){
  const syms=["₹","$","€","£"];
  for(let i=0;i<7;i++){
    const el=document.createElement('div');
    el.className='money';
    el.textContent=syms[Math.floor(Math.random()*syms.length)];
    el.style.left=x+'px'; el.style.top=y+'px';
    document.body.appendChild(el);
    const dx=(Math.random()*100)-50, dy=-(Math.random()*90+20);
    requestAnimationFrame(()=>{
      el.style.transform=`translate(${dx}px,${dy}px)`;
      el.style.opacity=0;
    });
    setTimeout(()=>el.remove(),600);
  }
}

/* ---------- RENDER ---------- */
function render(){
  const q = Q[current];
  const progress = Math.round((current/TOTAL)*100);

  let html = `
  <div class="card">
    <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
    <div class="small">${current+1}/50</div>
    <h3>${q.q}</h3>
    <div class="small">${q.h}</div>
  `;

  q.o.forEach(opt=>{
    const checked = answers[current]===opt[2] ? 'checked':'';
    html += `
    <label class="radio" onclick="choose(event, ${opt[2]})">
      <input type="radio" name="q${current}" ${checked}>
      <div>
        <div class="opt-title">${opt[0]}</div>
        <div class="opt-sub">${opt[1]}</div>
      </div>
    </label>`;
  });

  html += `
    <div class="row">
      <button class="btn-ghost" onclick="prev()">Back</button>
      <button onclick="next()">Next</button>
    </div>
  </div>`;

  app.innerHTML = html;
}

function choose(e, val){
  answers[current] = val;
  localStorage.setItem('answers', JSON.stringify(answers));
  burst(e.clientX, e.clientY);
}

function next(){
  if(current < TOTAL-1){ current++; render(); }
  else showResult();
}
function prev(){
  if(current>0){ current--; render(); }
}

/* ---------- RESULT ---------- */
function showResult(){
  const total = Object.values(answers).reduce((a,b)=>a+(b||0),0);
  const percent = Math.round((total/500)*100);
  let level = percent<=30?'Low':percent<=60?'Medium':percent<=85?'High':'Very High';

  let insights = [];
  if((answers[2]||0)<=3) insights.push("You spend excessive hours scrolling — that time is replacing income-building work.");
  if((answers[3]||0)<=4) insights.push("Your room/environment is messy — discipline is not visible in your space.");
  if((answers[21]||0)<=4) insights.push("You have clutter/broken items — your environment signals stagnation.");
  if((answers[30]||0)<=4) insights.push("Your Ishaan (NE) corner is neglected — order and clarity are missing.");

  app.innerHTML = `
  <div class="card">
    <h2>${user.name || 'Your'} Score: ${total}/500 (${percent}%)</h2>
    <div><span class="badge">Probability</span> ${level}</div>

    <p class="red">
      You are not busy — you are distracted.<br>
      If nothing changes, the next 5 years will look the same.
    </p>

    <h3>Insights</h3>
    <ul>${insights.map(i=>`<li>${i}</li>`).join('')}</ul>

    <h3>Scripture Warnings</h3>
    <p class="red">
      “परिच्छिन्नं गृहं लक्ष्मीः न वसति अशुद्धं” — Sri Suktam (Rigveda): Lakshmi does not stay in an unclean home.<br>
      “यत्र कूडं तत्र शनिः” — Vastu (Vishwakarma Prakash): Where there is junk, Shani resides; where Shani resides, poverty follows.<br>
      “अव्यवस्थित गृहस्थस्य धनं विलीनं भवति” — Atharva Veda: Disorganized households lose wealth.<br>
      “ईशान कोणे कुबेरः वसति… मलिने पलायति” — Kubera Tantra: Kuber leaves a dirty northeast corner.
    </p>

    <button onclick="showPlan()">मैं अमीर बनना चाहता हूँ / I Want to Become Rich</button>
  </div>`;
}

/* ---------- PLAN ---------- */
function showPlan(){
  let rows = [];

  if((answers[3]||0)<=4) rows.push(["Messy room","Deep clean entire room","24 hours"]);
  if((answers[31]||0)<=4) rows.push(["Clutter/junk","Remove broken items & trash","72 hours"]);
  if((answers[2]||0)<=3) rows.push(["High scrolling","Replace 1 hour with skill-building","Daily 30 days"]);
  if((answers[30]||0)<=4) rows.push(["Dirty NE corner","Clean Ishaan Kon & keep it clear","48 hours"]);
  if((answers[40]||0)<=4) rows.push(["No daily ritual","5–10 min discipline (prayer/meditation)","Daily"]);

  app.innerHTML = `
  <div class="card">
    <h2>तुम्हारी गरीबी के कारण और समाधान</h2>

    <table class="table">
      <tr><th>Problem</th><th>Task</th><th>Deadline</th></tr>
      ${rows.map(r=>`<tr><td>${r[0]}</td><td class="green">${r[1]}</td><td>${r[2]}</td></tr>`).join('')}
    </table>

    <h3>Daily Checklist</h3>
    <ul>
      <li>[ ] Make bed within 15 minutes of waking</li>
      <li>[ ] Keep surroundings clean (5–10 min)</li>
      <li>[ ] No junk accumulation</li>
      <li>[ ] 1 hour skill-building (no scrolling)</li>
      <li>[ ] 5–10 min discipline/prayer</li>
    </ul>

    <button onclick="finalCommit()">मैं शुरू करूंगा / I Will Start Today</button>
  </div>`;
}

function finalCommit(){
  alert("Shani has noted your promise. Lakshmi will return in 21 days if you stay consistent.");
}
