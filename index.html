<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampatti Audit</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background: radial-gradient(circle at top,#111827,#020617);
color:#fff;
}

.container{max-width:700px;margin:auto;padding:20px;}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,215,0,0.25);
padding:20px;
border-radius:12px;
}

.radio{
display:flex;
gap:12px;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid rgba(255,215,0,0.15);
cursor:pointer;
}

.radio:hover{
border-color:#ffd700;
background:rgba(255,215,0,0.05);
}

.small{font-size:12px;color:#aaa;}
.red{color:#ff6b6b;}
.green{color:#00ff99;}

button{
background:linear-gradient(90deg,#00ff99,#ffd700);
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

.score{
font-size:32px;
color:#ffd700;
font-weight:bold;
}

.reason-box{
background:rgba(255,255,255,0.03);
border-left:3px solid gold;
padding:10px;
margin-top:10px;
font-size:13px;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

let current=0;
let answers={};
let user={};

// 🔥 START
function start(){
app.innerHTML=`
<div class="card">
<h2>Wealth Audit</h2>
<input id="name" placeholder="Name"><br><br>
<input id="age" placeholder="Age"><br><br>
<button onclick="begin()">Start</button>
</div>`;
}

function begin(){
let n=document.getElementById("name").value;
let a=document.getElementById("age").value;
if(!n||!a){alert("Enter details");return;}
user={n,a};
render();
}

// 🔥 QUESTIONS (with reasoning)
const questions=[
{
q:"How much focused effort do you put daily toward earning money or building income skills?",
h:"आप रोज पैसे कमाने के लिए कितना प्रयास करते हैं?",
reason:"Your income grows only if your effort grows. No effort = no money growth.",
o:[
["Very little","बहुत कम",2],
["Sometimes","कभी-कभी",5],
["Consistent","नियमित",8],
["Very serious","बहुत गंभीर",10]
]
},
{
q:"On average, how many hours per day do you spend on social media for non-productive use?",
h:"आप रोज सोशल मीडिया पर कितना समय बर्बाद करते हैं?",
reason:"Time spent scrolling is directly taken away from income-building.",
o:[
["6+ hours","6+ घंटे",1],
["4-5 hours","4-5 घंटे",3],
["2-3 hours","2-3 घंटे",6],
["0-1 hour","0-1 घंटे",10]
]
},
{
q:"Do you actively plan your day with clear tasks?",
h:"क्या आप दिन की योजना बनाते हैं?",
reason:"Unplanned days lead to unplanned (and poor) financial outcomes.",
o:[
["No","नहीं",2],
["Sometimes","कभी-कभी",5],
["Yes","हाँ",8],
["Strict planning","पूरी योजना",10]
]
},
{
q:"Do you keep broken items in your house?",
h:"क्या आप घर में टूटी चीजें रखते हैं?",
reason:"Broken things represent stuck energy → stuck money.",
o:[
["Many","बहुत",2],
["Some","कुछ",5],
["Rarely","कम",8],
["None","नहीं",10]
]
},
{
q:"How ready is your space to receive opportunities?",
h:"क्या आपका घर तैयार है?",
reason:"Cluttered space = cluttered opportunities.",
o:[
["Messy","गंदा",2],
["Needs cleaning","सफाई चाहिए",5],
["Clean","साफ",8],
["Perfect","पूरी तरह साफ",10]
]
},
{
q:"Where does most of your time go every day?",
h:"आपका समय कहाँ जाता है?",
reason:"Your time decides your future income.",
o:[
["Phone","फोन",1],
["Useless work","बेकार काम",3],
["Job only","काम",7],
["Growth work","growth",10]
]
},
{
q:"If your habits continue for 5 years, what will happen?",
h:"आपकी आदतें क्या देंगी?",
reason:"Habits = future reality.",
o:[
["Worse","खराब",2],
["Same","वही",4],
["Better","बेहतर",7],
["Great","बहुत अच्छा",10]
]
},
{
q:"What life are you building for your family?",
h:"आप परिवार के लिए क्या बना रहे हैं?",
reason:"Your discipline decides your family's future.",
o:[
["Survival","गुज़ारा",2],
["Better","बेहतर",5],
["Comfort","आराम",8],
["Rich life","अच्छी जिंदगी",10]
]
},
{
q:"If your life ended today, how would you feel?",
h:"अंत में कैसा लगेगा?",
reason:"This reveals if you're living intentionally or wasting time.",
o:[
["Regret","पछतावा",2],
["Not enough","कम",4],
["Okay","ठीक",7],
["Proud","गर्व",10]
]
},
{
q:"How committed are you to changing your habits today?",
h:"क्या आप बदलेंगे?",
reason:"Awareness without action = no change.",
o:[
["No","नहीं",2],
["Maybe","शायद",5],
["Yes","हाँ",8],
["100%","पूरी तरह",10]
]
}
];

// 🔥 RENDER
function render(){
let q=questions[current];

let html=`<div class="card">
<h3>${q.q}</h3>
<div class="small">${q.h}</div>
<div class="reason-box">💡 ${q.reason}</div>
`;

q.o.forEach(opt=>{
html+=`
<label class="radio">
<input type="radio" name="q" onclick="save(${opt[2]})">
<div>
<div>${opt[0]}</div>
<div class="small">${opt[1]}</div>
</div>
</label>`;
});

html+=`
<button onclick="next()">Next</button>
</div>`;

app.innerHTML=html;
}

// 🔥 SAVE
function save(v){
answers[current]=v;
}

// 🔥 NEXT (block without answer)
function next(){
if(answers[current] == null){
alert("Answer the question first");
return;
}

if(current<questions.length-1){
current++;
render();
}else{
showResult();
}
}

// 🔥 RESULT
function showResult(){
let total=Object.values(answers).reduce((a,b)=>a+b,0);
let percent=Math.round((total/(questions.length*10))*100);

let msg="";

if(percent<40){
msg="You are blocking your own growth. Your habits are leading you toward struggle.";
}else if(percent<70){
msg="You are average right now. Some habits are helping, but many are holding you back.";
}else{
msg="You are on the right path. Stay consistent and your results will multiply.";
}

app.innerHTML=`
<div class="card">

<h2>${user.n}'s Result</h2>
<div class="score">${percent}%</div>

<p class="red">${msg}</p>

<h3>Reality Check</h3>
<p>
Your answers clearly show your current habits, environment, and mindset.
If nothing changes, this score becomes your future.
</p>

<h3>Next Step</h3>
<p class="green">
Start fixing your daily habits immediately. Small changes → big financial outcomes.
</p>

<button onclick="location.reload()">Restart</button>

</div>`;
}

start();

</script>

</body>
</html>
